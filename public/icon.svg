<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Location pin shape -->
  <path d="M256 16C158.8 16 80 94.8 80 192c0 132.4 160 296 176 296s176-163.6 176-296C432 94.8 353.2 16 256 16z" fill="#D4A017" opacity="0.15"/>
  <path d="M256 32C166.4 32 96 102.4 96 192c0 56 24 112 64 164.8 32.8 43.2 64.8 78.4 80 94.4L256 468l16-17.2c15.2-16 47.2-51.2 80-94.4C392 304 416 248 416 192 416 102.4 345.6 32 256 32z" fill="url(#pinGrad)" stroke="#B8860B" stroke-width="8"/>
  <!-- Inner circle background -->
  <circle cx="256" cy="192" r="120" fill="#FFF8E7"/>
  <!-- Jebena (Ethiopian coffee pot) -->
  <g transform="translate(256,185) scale(0.95)">
    <!-- Pot body -->
    <path d="M-8 60 C-8 60 -52 48 -56 0 C-60-48 -40-80 0-88 C40-80 60-48 56 0 C52 48 8 60 8 60 Z" fill="url(#jebenaBod)" stroke="#8B6914" stroke-width="4" stroke-linejoin="round"/>
    <!-- Pot base -->
    <ellipse cx="0" cy="62" rx="18" ry="6" fill="#8B6914"/>
    <ellipse cx="0" cy="62" rx="14" ry="4" fill="#C49A1A"/>
    <!-- Narrow neck -->
    <path d="M-10-88 C-10-88 -12-108 -8-118 C-4-128 4-128 8-118 C12-108 10-88 10-88" fill="url(#jebenaBod)" stroke="#8B6914" stroke-width="3"/>
    <!-- Spout (pouring lip) -->
    <path d="M8-118 C8-118 12-126 20-130 C28-134 36-130 36-124" fill="none" stroke="#8B6914" stroke-width="4" stroke-linecap="round"/>
    <!-- Handle -->
    <path d="M-56 0 C-56 0 -80-8 -84-32 C-88-56 -72-76 -52-68" fill="none" stroke="#8B6914" stroke-width="5" stroke-linecap="round"/>
    <!-- Decorative Ethiopian cross pattern on body -->
    <path d="M0-40 L0-20 M-10-30 L10-30" stroke="#B8860B" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <path d="M0 0 L0 20 M-10 10 L10 10" stroke="#B8860B" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <!-- Steam wisps -->
    <path d="M-8-130 C-8-138 -12-144 -6-152" stroke="#D4A017" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.5"/>
    <path d="M4-130 C4-140 8-148 2-158" stroke="#D4A017" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.4"/>
  </g>
  <!-- Gradients -->
  <defs>
    <linearGradient id="pinGrad" x1="96" y1="32" x2="416" y2="468" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E8B82B"/>
      <stop offset="0.5" stop-color="#D4A017"/>
      <stop offset="1" stop-color="#B8860B"/>
    </linearGradient>
    <linearGradient id="jebenaBod" x1="-40" y1="-80" x2="40" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C49A1A"/>
      <stop offset="0.5" stop-color="#A67C00"/>
      <stop offset="1" stop-color="#8B6914"/>
    </linearGradient>
  </defs>
</svg>
